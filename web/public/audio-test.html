<!DOCTYPE html>
<html>
<head>
<title>Aura — Audio Debug Test v2</title>
<style>
  body { background: #0c0c0a; color: #f0f0e8; font-family: monospace; padding: 32px; }
  button { font-size: 16px; padding: 10px 24px; margin: 6px; cursor: pointer; background: #222; color: #f0f0e8; border: 1px solid #444; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  #log { white-space: pre-wrap; font-size: 12px; line-height: 1.7; margin-top: 16px; max-height: 500px; overflow-y: auto; }
  .ok { color: #30d158; }
  .warn { color: #ff9f0a; }
  .err { color: #ff3c28; }
  canvas { border: 1px solid #333; margin-top: 12px; display: block; }
  h3 { color: #a080ff; margin-top: 24px; }
</style>
</head>
<body>
<h2>Aura — Audio Debug v2</h2>
<p>Pick a tab with music playing. Tick "Share tab audio".</p>
<button id="start">Start capture</button>
<button id="stop" disabled>Stop</button>
<canvas id="viz" width="512" height="100"></canvas>
<div id="log"></div>

<script>
const logEl = document.getElementById('log');
const viz = document.getElementById('viz');
const ctx2d = viz.getContext('2d');
let stream = null, audioCtx = null, analyser = null, fftData = null, tickId = null;

function msg(text, cls = '') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = text;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

document.getElementById('start').onclick = async () => {
  logEl.innerHTML = '';
  msg('--- Starting capture ---');

  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 5 },
      audio: true,
    });
  } catch (e) {
    msg(`Capture error: ${e.message}`, 'err');
    return;
  }

  // ── Tab info dump — all available metadata ──
  msg('\n=== TAB / STREAM INFO ===');
  const vTrack = stream.getVideoTracks()[0];
  if (vTrack) {
    msg(`video.label:       "${vTrack.label}"`);
    msg(`video.id:          "${vTrack.id}"`);
    msg(`video.kind:        "${vTrack.kind}"`);
    msg(`video.readyState:  "${vTrack.readyState}"`);
    const vs = vTrack.getSettings();
    msg(`video.displaySurface: "${vs.displaySurface}"`);
    msg(`video.width×height:   ${vs.width}×${vs.height}`);
    msg(`video.frameRate:      ${vs.frameRate}`);
    msg(`video.deviceId:       "${vs.deviceId}"`);
    // getCapabilities if available
    try {
      const vc = vTrack.getCapabilities();
      msg(`video.capabilities: ${JSON.stringify(vc)}`);
    } catch { msg('video.getCapabilities() not available'); }
  }

  const aTracks = stream.getAudioTracks();
  msg(`\naudio tracks: ${aTracks.length}`, aTracks.length > 0 ? 'ok' : 'err');
  if (!aTracks.length) { msg('No audio — tick "Share tab audio" in the picker.', 'err'); return; }

  const aTrack = aTracks[0];
  msg(`label="${aTrack.label}" enabled=${aTrack.enabled} muted=${aTrack.muted} state=${aTrack.readyState}`);
  const s = aTrack.getSettings();
  msg(`sampleRate=${s.sampleRate} channels=${s.channelCount}`);

  document.getElementById('start').disabled = true;
  document.getElementById('stop').disabled = false;

  // ── Test 1: MediaRecorder — does the stream contain real audio bytes? ──
  msg('\n=== TEST 1: MediaRecorder ===');
  try {
    const recorder = new MediaRecorder(new MediaStream([aTrack]), { mimeType: 'audio/webm' });
    const chunks = [];
    recorder.ondataavailable = (e) => chunks.push(e.data);
    recorder.start();
    await sleep(2000);
    recorder.stop();
    await sleep(200);
    const totalBytes = chunks.reduce((sum, c) => sum + c.size, 0);
    msg(`Recorded ${chunks.length} chunks, ${totalBytes} bytes`, totalBytes > 500 ? 'ok' : 'err');
    if (totalBytes > 500) {
      msg('Audio data EXISTS in the stream. Web Audio routing is the issue.', 'ok');
    } else {
      msg('Stream has no real audio data. Chrome is not capturing tab audio.', 'err');
    }
  } catch (e) {
    msg(`MediaRecorder error: ${e.message}`, 'err');
  }

  // ── Test 2: Direct createMediaStreamSource ──
  msg('\n=== TEST 2: Direct MediaStreamSource ===');
  audioCtx = new AudioContext();
  if (audioCtx.state !== 'running') {
    await audioCtx.resume();
  }
  msg(`AudioContext state: ${audioCtx.state}`);

  const src2 = audioCtx.createMediaStreamSource(new MediaStream([aTrack]));
  const an2 = audioCtx.createAnalyser();
  an2.fftSize = 1024;
  src2.connect(an2);
  const fft2 = new Uint8Array(an2.frequencyBinCount);
  await sleep(1000);
  an2.getByteFrequencyData(fft2);
  const max2 = Math.max(...fft2);
  msg(`max=${max2}`, max2 > 5 ? 'ok' : 'err');

  // ── Test 3: Same but connected to destination via gain=0 ──
  msg('\n=== TEST 3: Connected to destination (gain=0) ===');
  const src3 = audioCtx.createMediaStreamSource(new MediaStream([aTrack]));
  const an3 = audioCtx.createAnalyser();
  an3.fftSize = 1024;
  const gain3 = audioCtx.createGain();
  gain3.gain.value = 0;
  src3.connect(an3);
  an3.connect(gain3);
  gain3.connect(audioCtx.destination);
  const fft3 = new Uint8Array(an3.frequencyBinCount);
  await sleep(1000);
  an3.getByteFrequencyData(fft3);
  const max3 = Math.max(...fft3);
  msg(`max=${max3}`, max3 > 5 ? 'ok' : 'err');

  // ── Test 4: <audio> element, volume=0 (not muted), createMediaElementSource ──
  msg('\n=== TEST 4: <audio> volume=0 + createMediaElementSource ===');
  try {
    const audioEl = document.createElement('audio');
    audioEl.srcObject = new MediaStream([aTrack]);
    audioEl.volume = 0.001; // near-silent but not muted
    await audioEl.play();
    msg(`<audio> playing: ${!audioEl.paused}`);
    const src4 = audioCtx.createMediaElementSource(audioEl);
    const an4 = audioCtx.createAnalyser();
    an4.fftSize = 1024;
    src4.connect(an4);
    src4.connect(audioCtx.destination); // required for createMediaElementSource
    const fft4 = new Uint8Array(an4.frequencyBinCount);
    await sleep(1500);
    an4.getByteFrequencyData(fft4);
    const max4 = Math.max(...fft4);
    msg(`max=${max4}`, max4 > 5 ? 'ok' : 'err');

    if (max4 > 5) {
      msg('TEST 4 WORKS — <audio> + createMediaElementSource is the fix.', 'ok');
      analyser = an4;
      fftData = fft4;
    }
  } catch (e) {
    msg(`Test 4 error: ${e.message}`, 'err');
  }

  // ── Test 5: Use original stream directly (not new MediaStream) ──
  msg('\n=== TEST 5: Original stream (not wrapped) ===');
  try {
    const src5 = audioCtx.createMediaStreamSource(stream);
    const an5 = audioCtx.createAnalyser();
    an5.fftSize = 1024;
    src5.connect(an5);
    const fft5 = new Uint8Array(an5.frequencyBinCount);
    await sleep(1000);
    an5.getByteFrequencyData(fft5);
    const max5 = Math.max(...fft5);
    msg(`max=${max5}`, max5 > 5 ? 'ok' : 'err');

    if (max5 > 5 && !analyser) {
      msg('TEST 5 WORKS — use original stream, not wrapped.', 'ok');
      analyser = an5;
      fftData = fft5;
    }
  } catch (e) {
    msg(`Test 5 error: ${e.message}`, 'err');
  }

  // ── Summary ──
  msg('\n=== SUMMARY ===');
  const results = { 'MediaRecorder': '?', 'Direct': max2, 'Gain=0': max3, 'AudioElement': '?', 'OrigStream': '?' };
  msg(`Test 2 (direct):        max=${max2} ${max2 > 5 ? '✓' : '✗'}`);
  msg(`Test 3 (gain=0):        max=${max3} ${max3 > 5 ? '✓' : '✗'}`);
  msg('Test 1, 4, 5: see above');

  if (analyser && fftData) {
    msg('\nStarting live visualizer with the working method...', 'ok');
  } else {
    msg('\nNo method produced data. Using Test 2 for visualization (will show silence).', 'warn');
    analyser = an2;
    fftData = fft2;
  }

  // Live visualizer
  tickId = setInterval(() => {
    if (!analyser) return;
    analyser.getByteFrequencyData(fftData);
    const max = Math.max(...fftData);
    ctx2d.fillStyle = '#0c0c0a';
    ctx2d.fillRect(0, 0, 512, 100);
    for (let i = 0; i < 128; i++) {
      const v = fftData[i];
      const h = (v / 255) * 90;
      ctx2d.fillStyle = v > 30 ? '#a080ff' : '#333';
      ctx2d.fillRect(i * 4, 100 - h, 3, h);
    }
    document.title = `max=${max} — Audio Debug`;
  }, 100);
};

document.getElementById('stop').onclick = () => {
  if (tickId) clearInterval(tickId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close().catch(() => {});
  stream = audioCtx = analyser = fftData = null;
  document.getElementById('start').disabled = false;
  document.getElementById('stop').disabled = true;
  msg('\n--- Stopped ---');
};
</script>
</body>
</html>
